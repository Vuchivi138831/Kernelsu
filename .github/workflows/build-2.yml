name: Build Kernel 4.9 with Proton Clang

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev bison flex libssl-dev libgmp-dev libmpc-dev libmpfr-dev texinfo libyaml-dev cpio
          
      - name: Install Python 2
        run: |
          sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Download GCC Toolchains (Trợ thủ cho Proton Clang)
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b ndk-release-r21 --depth=1 $GITHUB_WORKSPACE/gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b ndk-release-r21 --depth=1 $GITHUB_WORKSPACE/gcc32

      - name: Fix Driver Makefile (Sửa tận gốc lỗi Thụt lề)
        run: |
          echo "Bẻ gãy cờ -Werror và ép cờ bỏ qua lỗi thụt lề vào toàn bộ hệ thống..."
          # Cách 1: Thay thế trực tiếp trong file Makefile chính nếu nó ép -Werror
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror=misleading-indentation/-Wno-misleading-indentation/g' 2>/dev/null || true
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Wmisleading-indentation/-Wno-misleading-indentation/g' 2>/dev/null || true
          
          # Cách 2: Vô hiệu hóa toàn bộ cờ -Werror tổng thể của hệ thống kernel
          sed -i 's/subdir-ccflags-y += -Werror/# subdir-ccflags-y += -Werror/g' drivers/input/touchscreen/mediatek/hxchipset/Makefile 2>/dev/null || true

      - name: Prepare Config
        run: |
          if [ ! -f "dandelion_config" ]; then
            echo "ERROR: Could not find 'dandelion_config' at the root directory!"
            exit 1
          fi
          echo "Found config file: dandelion_config"
          mkdir -p out
          cp dandelion_config out/.config

      - name: Compile Kernel
        run: |
          # Trỏ PATH vào thư mục Clang riêng của bạn và 2 bộ GCC bổ trợ
          export PATH="$GITHUB_WORKSPACE/Clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          
          # Cấu hình biến môi trường cho Proton Clang
          MAKE_FLAGS="O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCFLAGS=-fcommon \
            HOSTLDFLAGS=-fcommon"
          
          # Bước 1: Đồng bộ hóa cấu hình cũ
          make $MAKE_FLAGS olddefconfig
            
          # Bước 2: Tiến hành biên dịch ra file Image
          make -j$(nproc --all) $MAKE_FLAGS Image

      - name: Compress Image to Gzip
        run: |
          if [ -f out/arch/arm64/boot/Image ]; then
            gzip -c out/arch/arm64/boot/Image > out/arch/arm64/boot/Image.gz
            echo "Successfully compressed Image to Image.gz"
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "Image.gz already exists, skipping compression."
          else
            echo "ERROR: Target Image file not found!"
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-ProtonClang
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/Image.gz
            out/.config
