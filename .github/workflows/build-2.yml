name: Build Kernel 4.9 with KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev bison flex libssl-dev libgmp-dev libmpc-dev libmpfr-dev texinfo libyaml-dev cpio
          
      - name: Install Python 2
        run: |
          sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Prepare Config
        run: |
          # Kiểm tra file dandelion_config ở thư mục gốc
          if [ ! -f "dandelion_config" ]; then
            echo "ERROR: Could not find 'dandelion_config' at the root directory!"
            exit 1
          fi
          echo "Found config file: dandelion_config"
          
          # Tạo thư mục out và sao chép cấu hình thành .config
          mkdir -p out
          cp dandelion_config out/.config

      - name: Compile Kernel
        run: |
          # Trỏ PATH vào thư mục Clang đã được push sẵn trong mã nguồn của bạn
          export PATH="$GITHUB_WORKSPACE/Clang/bin:$PATH"
          
          # Bước 1: Đồng bộ hóa cấu hình cũ từ file config của bạn (Bổ sung CLANG_TRIPLE)
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            olddefconfig
            
          # Bước 2: Tiến hành biên dịch ra file Image (Bổ sung CLANG_TRIPLE)
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image

      - name: Compress Image to Gzip
        run: |
          # Kiểm tra xem file Image nằm ở đâu và tiến hành nén gzip
          if [ -f out/arch/arm64/boot/Image ]; then
            gzip -c out/arch/arm64/boot/Image > out/arch/arm64/boot/Image.gz
            echo "Successfully compressed Image to Image.gz"
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "Image.gz already exists, skipping compression."
          else
            echo "ERROR: Target Image file not found!"
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-ProtonClang
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/Image.gz
            out/.config
