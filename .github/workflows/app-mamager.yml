name: Bien dich KernelSU Manager 32-bit

on:
  workflow_dispatch:

jobs:
  build-all-32bit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ma nguon
      uses: actions/checkout@v4

    - name: Thiet lap Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Thiet lap Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Thiet lap Bo bien dich Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: armv7-linux-androideabi

    - name: Cai dat cargo-ndk
      run: cargo install cargo-ndk

    - name: Tai package va Ghi de file unix.rs cua hole-punch hoan chinh
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo fetch --target armv7-linux-androideabi
        
        FILE_PATH=$(find /home/runner/.cargo/git/checkouts/hole-punch-* -name "unix.rs" 2>/dev/null | head -n 1)
        
        if [ -n "$FILE_PATH" ]; then
          echo "🛠️ Dang ghi de file unix.rs tai: $FILE_PATH"
          
          # Su dung cat EOF de tao lai file unix.rs sach se, da fix toan bo kieu 32-bit/64-bit
          cat << 'EOF' > "$FILE_PATH"
use std::fs::File;
use std::io;
use std::os::unix::io::AsRawFd;

use libc::{c_int, lseek, off_t, SEEK_DATA, SEEK_HOLE};

use crate::{ScanError, Segment, Tag};

pub fn scan<F: AsRawFd>(f: &F) -> Result<Vec<Segment>, ScanError> {
    let fd = f.as_raw_fd();

    unsafe {
        let end = lseek(fd, 0, libc::SEEK_END);
        if end < 0 {
            return Err(ScanError::Io(io::Error::last_os_error()));
        }

        let mut tags = Vec::new();

        if let Some(first_hole) = find_next_hole(fd, 0)? {
            if first_hole > 0 {
                tags.push(Tag::Data(0));
            }
            tags.push(Tag::Hole(first_hole as i64));
        } else {
            tags.push(Tag::Data(0));
            tags.push(Tag::End(end as i64));
            return Ok(crate::tags_to_segments(tags));
        }

        let mut last_offset = tags.last().unwrap().clone();

        while last_offset.offset() < end as i64 {
            match last_offset {
                Tag::Data(x) => {
                    if let Some(next_offset) = find_next_hole(fd, x as off_t)? {
                        last_offset = Tag::Hole(next_offset as i64);
                        tags.push(last_offset.clone());
                    } else {
                        last_offset = Tag::End(end as i64);
                        tags.push(last_offset.clone());
                    }
                }
                Tag::Hole(x) => {
                    if let Some(next_offset) = find_next_data(fd, x as off_t)? {
                        last_offset = Tag::Data(next_offset as i64);
                        tags.push(last_offset.clone());
                    } else {
                        last_offset = Tag::End(end as i64);
                        tags.push(last_offset.clone());
                    }
                }
                Tag::End(_) => break,
            }
        }

        if tags.last().unwrap().offset() < end as i64 {
            tags.push(Tag::End(end as i64));
        }

        let mut new_end = lseek(fd, 0, libc::SEEK_CUR);
        if new_end < 0 {
            new_end = end;
        }
        if tags.last().unwrap().offset() > new_end as i64 {
            tags.pop();
            tags.push(Tag::End(new_end as i64));
        }

        Ok(crate::tags_to_segments(tags))
    }
}

fn find_next_hole(fd: c_int, offset: off_t) -> Result<Option<off_t>, ScanError> {
    unsafe {
        let new_offset = lseek(fd, offset as off_t, SEEK_HOLE);
        if new_offset < 0 {
            let err = io::Error::last_os_error();
            if err.kind() == io::ErrorKind::InvalidInput {
                return Ok(None);
            }

            return Err(ScanError::Io(err));
        }

        Ok(some_if_valid(new_offset))
    }
}

fn find_next_data(fd: c_int, offset: off_t) -> Result<Option<off_t>, ScanError> {
    unsafe {
        let new_offset = lseek(fd, offset as off_t, SEEK_DATA);
        if new_offset < 0 {
            let err = io::Error::last_os_error();
            if err.kind() == io::ErrorKind::InvalidInput {
                return Ok(None);
            }

            return Err(ScanError::Io(err));
        }

        Ok(some_if_valid(new_offset))
    }
}

fn some_if_valid(offset: off_t) -> Option<off_t> {
    if offset < 0 {
        None
    } else {
        Some(offset)
    }
}
EOF
          echo "✅ Da thay the file unix.rs nguyen ban bang ma nguon va 32-bit on dinh!"
        else
          echo "❌ Khong tim thay thu vien hole-punch!"
          exit 1
        fi

    - name: Bien dich ksud 32-bit
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo ndk --target armv7-linux-androideabi --platform 21 build --release

    - name: Dong bo vao thu muc jniLibs
      run: |
        TARGET_JNI="drivers/KernelSU-0.9.5/manager/app/src/main/jniLibs"
        rm -rf "$TARGET_JNI/arm64-v8a"
        mkdir -p "$TARGET_JNI/armeabi-v7a"
        cp drivers/KernelSU-0.9.5/userspace/target/armv7-linux-androideabi/release/ksud "$TARGET_JNI/armeabi-v7a/libksud.so"

    - name: Cap quyen thu thi cho Gradle
      run: chmod +x drivers/KernelSU-0.9.5/manager/gradlew

    - name: Tien hanh bien dich APK Manager (Max Speed CPU)
      run: |
        cd drivers/KernelSU-0.9.5/manager
        ./gradlew assembleRelease --no-daemon --parallel -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Tai thanh pham APK len Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Manager-32bit
        path: drivers/KernelSU-0.9.5/manager/app/build/outputs/apk/release/*.apk
