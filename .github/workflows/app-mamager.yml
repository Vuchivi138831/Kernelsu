name: Bien dich KernelSU Manager 32-bit

on:
  workflow_dispatch:

jobs:
  build-all-32bit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ma nguon
      uses: actions/checkout@v4

    - name: Thiet lap Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Thiet lap Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Thiet lap Bo bien dich Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: armv7-linux-androideabi

    - name: Cai dat cargo-ndk
      run: cargo install cargo-ndk

    - name: Tai package va Va loi ma nguon hole-punch bang toan tu as
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo fetch --target armv7-linux-androideabi
        
        FILE_PATH=$(find /home/runner/.cargo/git/checkouts/hole-punch-* -name "unix.rs" 2>/dev/null | head -n 1)
        
        if [ -n "$FILE_PATH" ]; then
          echo "🛠️ Dang tien hanh va loi bang toan tu cast 'as' tai: $FILE_PATH"
          
          # Sửa chính xác các dòng lỗi bằng lệnh thay thế chuỗi an toàn tuyệt đối cho YAML
          sed -i 's/while last_offset.offset() < end {/while last_offset.offset() < end as i64 {/g' "$FILE_PATH"
          sed -i 's/find_next_hole(fd, x)?/find_next_hole(fd, x as off_t)?/g' "$FILE_PATH"
          sed -i 's/Tag::Hole(next_offset)/Tag::Hole(next_offset as i64)/g' "$FILE_PATH"
          sed -i 's/Tag::End(end)/Tag::End(end as i64)/g' "$FILE_PATH"
          sed -i 's/find_next_data(fd, x)?/find_next_data(fd, x as off_t)?/g' "$FILE_PATH"
          sed -i 's/Tag::Data(next_offset)/Tag::Data(next_offset as i64)/g' "$FILE_PATH"
          sed -i 's/tags.push(Tag::End(end))/tags.push(Tag::End(end as i64))/g' "$FILE_PATH"
          sed -i 's/tags.push(Tag::End(new_end))/tags.push(Tag::End(new_end as i64))/g' "$FILE_PATH"
          
          # Fix lỗi lseek nhận lệch kiểu trên nền tảng 32-bit công thức chuẩn hóa
          sed -i 's/let new_offset = lseek(fd, offset, SEEK_HOLE);/let new_offset = lseek(fd, offset as off_t, SEEK_HOLE);/g' "$FILE_PATH"
          sed -i 's/let new_offset = lseek(fd, offset, SEEK_DATA);/let new_offset = lseek(fd, offset as off_t, SEEK_DATA);/g' "$FILE_PATH"
          
          # Đồng bộ kiểu trả về cuối cùng của option
          sed -i 's/Ok(Some(new_offset))/Ok(Some(new_offset as off_t))/g' "$FILE_PATH"
          
          echo "✅ Da xac thuc chuoi va sua chua ma nguon hoan tat!"
        else
          echo "❌ Khong tim thay thu vien hole-punch!"
          exit 1
        fi

    - name: Bien dich ksud 32-bit
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo ndk --target armv7-linux-androideabi --platform 21 build --release

    - name: Dong bo vao thu muc jniLibs
      run: |
        TARGET_JNI="drivers/KernelSU-0.9.5/manager/app/src/main/jniLibs"
        rm -rf "$TARGET_JNI/arm64-v8a"
        mkdir -p "$TARGET_JNI/armeabi-v7a"
        cp drivers/KernelSU-0.9.5/userspace/target/armv7-linux-androideabi/release/ksud "$TARGET_JNI/armeabi-v7a/libksud.so"

    - name: Cap quyen thu thi cho Gradle
      run: chmod +x drivers/KernelSU-0.9.5/manager/gradlew

    - name: Tien hanh bien dich APK Manager (Max Speed CPU)
      run: |
        cd drivers/KernelSU-0.9.5/manager
        ./gradlew assembleRelease --no-daemon --parallel -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Tai thanh pham APK len Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Manager-32bit
        path: drivers/KernelSU-0.9.5/manager/app/build/outputs/apk/release/*.apk
