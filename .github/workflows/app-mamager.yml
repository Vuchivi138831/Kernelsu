name: Bien dich KernelSU Manager 32-bit

on:
  workflow_dispatch:

jobs:
  build-all-32bit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ma nguon
      uses: actions/checkout@v4

    - name: Thiet lap Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Thiet lap Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Thiet lap Bo bien dich Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: armv7-linux-androideabi

    - name: Cai dat cargo-ndk
      run: cargo install cargo-ndk

    - name: Tai truoc cac package va Va loi kieu du lieu hole-punch
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        # Chay fetch de Cargo tai cac thu vien phụ thuộc ve thu muc cache cua runner
        cargo fetch --target armv7-linux-androideabi
        
        # Tim file unix.rs cua thu vien hole-punch trong bo nho cache va va loi i32/i64 bang cach ep kieu off_t
        HOLE_PUNCH_SRC=$(find /home/runner/.cargo/git/checkouts/hole-punch-* -name "unix.rs" 2>/dev/null || true)
        if [ -n "$HOLE_PUNCH_SRC" ]; then
          echo "🛠️ Dang va loi cho file: $HOLE_PUNCH_SRC"
          # Thay the kieu du lieu off_t trong ham thành i64 de khop voi logic cua ho
          sed -i 's/: off_t/: i64/g' "$HOLE_PUNCH_SRC"
          sed -i 's/-> Result<Option<off_t>/-> Result<Option<i64>/g' "$HOLE_PUNCH_SRC"
          echo "✅ Da va loi xong hole-punch!"
        else
          echo "⚠️ Khong tim thay file unix.rs cua hole-punch de va."
        fi

    - name: Bien dich ksud 32-bit
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        # Thêm co thiet lap offset file 64-bit cho trinh bien dich C/C++ phu tro neu co
        export CFLAGS="-D_FILE_OFFSET_BITS=64"
        cargo ndk --target armv7-linux-androideabi --platform 21 build --release

    - name: Dong bo vao thu muc jniLibs
      run: |
        TARGET_JNI="drivers/KernelSU-0.9.5/manager/app/src/main/jniLibs"
        rm -rf "$TARGET_JNI/arm64-v8a"
        mkdir -p "$TARGET_JNI/armeabi-v7a"
        cp drivers/KernelSU-0.9.5/userspace/target/armv7-linux-androideabi/release/ksud "$TARGET_JNI/armeabi-v7a/libksud.so"

    - name: Cap quyen thu thi cho Gradle
      run: chmod +x drivers/KernelSU-0.9.5/manager/gradlew

    - name: Tien hanh bien dich APK Manager (Max Speed CPU)
      run: |
        cd drivers/KernelSU-0.9.5/manager
        ./gradlew assembleRelease --no-daemon --parallel -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Tai thanh pham APK len Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Manager-32bit
        path: drivers/KernelSU-0.9.5/manager/app/build/outputs/apk/release/*.apk
 