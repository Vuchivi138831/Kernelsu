name: Bien dich KernelSU Manager 32-bit

on:
  workflow_dispatch:

jobs:
  build-all-32bit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ma nguon
      uses: actions/checkout@v4

    - name: Thiet lap Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Thiet lap Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Thiet lap Bo bien dich Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: armv7-linux-androideabi

    - name: Cai dat cargo-ndk
      run: cargo install cargo-ndk

    - name: Tai package va Va loi ma nguon hole-punch & loopdev & su.rs
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo fetch --target armv7-linux-androideabi
        
        # 1. TIM VA VA LOI THU VIEN HOLE-PUNCH
        FILE_HP=$(find /home/runner/.cargo/git/checkouts/hole-punch-* -name "unix.rs" 2>/dev/null | head -n 1)
        if [ -n "$FILE_HP" ]; then
          echo "🛠️ Dang va loi hole-punch tai: $FILE_HP"
          sed -i 's/while last_offset.offset() < end {/while last_offset.offset() < end as i64 {/g' "$FILE_HP"
          sed -i 's/find_next_hole(fd, x)?/find_next_hole(fd, x as off_t)?/g' "$FILE_HP"
          sed -i 's/Tag::Hole(next_offset)/Tag::Hole(next_offset as i64)/g' "$FILE_HP"
          sed -i 's/Tag::End(end)/Tag::End(end as i64)/g' "$FILE_HP"
          sed -i 's/find_next_data(fd, x)?/find_next_data(fd, x as off_t)?/g' "$FILE_HP"
          sed -i 's/Tag::Data(next_offset)/Tag::Data(next_offset as i64)/g' "$FILE_HP"
          sed -i 's/tags.push(Tag::End(end))/tags.push(Tag::End(end as i64))/g' "$FILE_HP"
          sed -i 's/tags.push(Tag::End(new_end))/tags.push(Tag::End(new_end as i64))/g' "$FILE_HP"
          sed -i 's/let new_offset = lseek(fd, offset, SEEK_HOLE);/let new_offset = lseek(fd, offset as off_t, SEEK_HOLE);/g' "$FILE_HP"
          sed -i 's/let new_offset = lseek(fd, offset, SEEK_DATA);/let new_offset = lseek(fd, offset as off_t, SEEK_DATA);/g' "$FILE_HP"
          sed -i 's/Ok(Some(new_offset))/Ok(Some(new_offset as off_t))/g' "$FILE_HP"
          echo "✅ Da va xong hole-punch!"
        fi
        
        # 2. TIM VA VA LOI THU VIEN LOOPDEV
        FILE_LD=$(find /home/runner/.cargo/git/checkouts/loopdev-* -name "lib.rs" 2>/dev/null | head -n 1)
        if [ -n "$FILE_LD" ]; then
          echo "🛠️ Dang va loi loopdev tai: $FILE_LD"
          sed -i 's/libc::major(m.rdev())/libc::major(m.rdev() as libc::dev_t)/g' "$FILE_LD"
          sed -i 's/libc::minor(m.rdev())/libc::minor(m.rdev() as libc::dev_t)/g' "$FILE_LD"
          echo "✅ Da va xong loopdev!"
        fi

        # 3. VA LOI THIEU BIEN pw TRONG FILE su.rs CUC BO
        FILE_SU="src/su.rs"
        if [ -f "$FILE_SU" ]; then
          echo "🛠️ Dang sua loi bien 'pw' trong $FILE_SU"
          # Chen mot khai bao bien pw gia lap (Option::None) ngay truoc khoi match pw de khong bi loi thieu scope
          sed -i 's/match pw {/let pw: Option<libc::passwd> = None; match pw {/g' "$FILE_SU"
          echo "✅ Da va xong su.rs!"
        else
          echo "⚠️ Khong tim thay src/su.rs cuc bo!"
        fi

    - name: Bien dich ksud 32-bit
      run: |
        cd drivers/KernelSU-0.9.5/userspace/ksud
        cargo ndk --target armv7-linux-androideabi --platform 21 build --release

    - name: Dong bo vao thu muc jniLibs
      run: |
        TARGET_JNI="drivers/KernelSU-0.9.5/manager/app/src/main/jniLibs"
        rm -rf "$TARGET_JNI/arm64-v8a"
        mkdir -p "$TARGET_JNI/armeabi-v7a"
        cp drivers/KernelSU-0.9.5/userspace/target/armv7-linux-androideabi/release/ksud "$TARGET_JNI/armeabi-v7a/libksud.so"

    - name: Cap quyen thu thi cho Gradle
      run: chmod +x drivers/KernelSU-0.9.5/manager/gradlew

    - name: Tien hanh bien dich APK Manager (Max Speed CPU)
      run: |
        cd drivers/KernelSU-0.9.5/manager
        ./gradlew assembleRelease --no-daemon --parallel -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Tai thanh pham APK len Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Manager-32bit
        path: drivers/KernelSU-0.9.5/manager/app/build/outputs/apk/release/*.apk
