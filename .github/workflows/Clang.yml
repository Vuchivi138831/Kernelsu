name: Download and Push Proton Clang

on:
  workflow_dispatch:

jobs:
  download-and-push:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Old Gitlink (If Exists)
        run: |
          # Xóa thư mục lỗi và xóa nó khỏi bộ nhớ đệm của Git (index)
          git rm -rf --cached Clang || true
          rm -rf Clang

      - name: Download Proton Clang
        run: |
          # Clone Proton Clang vào thư mục tạm thời
          git clone https://github.com/kdrag0n/proton-clang.git --depth=1 Clang_tmp
          
          # Di chuyển dữ liệu sang thư mục Clang chính thức
          mkdir Clang
          cp -r Clang_tmp/* Clang/
          
          # Xóa thư mục tạm thời và QUAN TRỌNG NHẤT: Xóa thư mục .git ẩn bên trong Clang
          rm -rf Clang_tmp
          rm -rf Clang/.git
          rm -f Clang/.gitattributes Clang/.gitignore

      - name: Grant Executable Permissions
        run: |
          if [ -d "Clang/bin" ]; then
            chmod -R +x Clang/bin/
            echo "Successfully granted execution permissions to Clang/bin"
          else
            echo "ERROR: Clang/bin directory not found!"
            exit 1
          fi

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Clang
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Fix: Add full Proton Clang toolchain source instead of gitlink"
            git push origin HEAD:${{ github.ref }}
            echo "Successfully pushed Clang directory to repository!"
          fi
