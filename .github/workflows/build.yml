name: Build Redmi 9A KernelSU (Stable)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    # ===== 1. CÀI ĐẶT CÁC GÓI NỀN APT (BỔ SUNG THƯ VIỆN ĐỂ PYTHON2 KHÔNG LỖI) =====
    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zlib1g-dev \
        libffi-dev libsqlite3-dev zip libreadline-dev libbz2-dev

    # ===== 2. CẤU HÌNH CACHE CHO PYTHON2 (SỬ DỤNG KHÓA VỚI THƯ VIỆN MỚI) =====
    - name: Cache Python2 Core
      id: python2-cache
      uses: actions/cache@v4
      with:
        path: /home/runner/python2_install
        key: python2-complete-cache-v3

    # ===== 3. THIẾT LẬP VÀ BIÊN DỊCH PYTHON2 =====
    - name: Setup Python2
      run: |
        if [ "${{ steps.python2-cache.outputs.cache-hit }}" != 'true' ]; then
          echo "[+] Không tìm thấy Cache hoặc Cache lỗi, tiến hành biên dịch Python2 mới..."
          mkdir -p /home/runner/python2_install
          
          cd $GITHUB_WORKSPACE
          wget -q https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=/home/runner/python2_install
          make -j$(nproc)
          make install
          
          cd $GITHUB_WORKSPACE
          rm -rf Python-2.7.18 Python-2.7.18.tgz
        else
          echo "[+] Đã tìm thấy Bộ nhớ đệm (Cache) hợp lệ! Bỏ qua bước biên dịch Python2."
        fi

        # Tạo liên kết ảo để hệ thống (kể cả script drvgen) nhận diện lệnh python
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python2
        python --version

    # ===== 4. BIÊN DỊCH KERNEL (DÙNG CLANG TRONG REPO + PYTHON2 TRONG CACHE) =====
    - name: Compile Kernel
      run: |
        # Kiểm tra sự tồn tại của Clang trong thư mục toolchains của repo
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/clang/bin/clang" ]; then
          echo "[-] LỖI: Không tìm thấy Clang tại toolchains/clang/ trong repository của bạn!"
          exit 1
        fi

        # Đưa Clang (trong repo) và Python2 (trong cache) lên đầu biến PATH
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:/home/runner/python2_install/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Cấu hình biên dịch chéo
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        export HOSTCFLAGS="-fcommon"
        export LOCALVERSION=""
        mkdir -p out

        make O=out dandelion_defconfig LOCALVERSION=""
        make O=out olddefconfig LOCALVERSION=""

        # Tiến hành build kernel và ép chặt thông số Wi-Fi tránh lỗi HIF dòng 141
        make -j$(nproc --all) O=out \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          MTK_PLATFORM=mt6765 \
          MTK_COMBO_CHIP=MT6632 \
          WLAN_CHIP_ID=MT6632 \
          CONFIG_MTK_COMBO_WIFI_HIF=sdio \
          HOSTCFLAGS="-fcommon" \
          KCFLAGS="-w" \
          LOCALVERSION="" \
          EXTRAVERSION=""

    # ===== 5. ĐÓNG GÓI SẢN PHẨM =====
    - name: Pack Kernel Artifacts
      if: success()
      run: |
        cd out/arch/arm64/boot/
        if [ -f Image.gz ]; then
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz
        else
          echo "Error: Image.gz not found!"
          exit 1
        fi

    # ===== 6. UPLOAD SẢN PHẨM LÊN GIAO DIỆN GITHUB =====
    - name: Upload Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi9A-KSU-Zip
        path: out/arch/arm64/boot/Kernel-Redmi9A-KSU.zip
 