name: Build Redmi 9A KernelSU (Stable)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    # ===== 1. CÀI ĐẶT CÁC GÓI NỀN APT =====
    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zlib1g-dev \
        libffi-dev libsqlite3-dev zip libreadline-dev libbz2-dev unzip

    # ===== 2. CẤU HÌNH CACHE CHO PYTHON2 =====
    - name: Cache Python2 Core
      id: python2-cache
      uses: actions/cache@v4
      with:
        path: /home/runner/python2_install
        key: python2-complete-cache-v3

    # ===== 3. THIẾT LẬP PYTHON2 =====
    - name: Setup Python2
      run: |
        if [ "${{ steps.python2-cache.outputs.cache-hit }}" != 'true' ]; then
          mkdir -p /home/runner/python2_install
          cd $GITHUB_WORKSPACE
          wget -q https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=/home/runner/python2_install
          make -j$(nproc)
          make install
          cd $GITHUB_WORKSPACE
          rm -rf Python-2.7.18 Python-2.7.18.tgz
        fi
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python2

    # ===== BƯỚC THAY THẾ: XÓA CŨ - GIẢI NÉN MỚI TRỰC TIẾP =====
    - name: Replace Connectivity Module
      run: |
        echo "[+] Đang tiến hành làm sạch và thay thế module connectivity..."
        
        if [ ! -f "connectivity.zip" ]; then
          echo "[-] LỖI: Không tìm thấy file connectivity.zip trong repository của bạn!"
          echo "[-] Vui lòng nén thư mục connectivity sạch trên điện thoại và upload lên repo."
          exit 1
        fi

        if [ -d "drivers/misc/mediatek/connectivity" ]; then
          echo "[+] Xóa thư mục cũ: drivers/misc/mediatek/connectivity"
          rm -rf drivers/misc/mediatek/connectivity
        fi

        mkdir -p drivers/misc/mediatek/connectivity

        echo "[+] Đang giải nén connectivity.zip mới vào hệ thống..."
        unzip -q connectivity.zip -d drivers/misc/mediatek/connectivity/
        
        echo "[+] Cấu trúc sau khi giải nén:"
        ls -la drivers/misc/mediatek/connectivity/

    # ===== 4. BIÊN DỊCH KERNEL SIÊU TỐI GIẢN (ĐÃ LOẠI BỎ VÁ WI-FI) =====
    - name: Compile Kernel
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/clang/bin/clang" ]; then
          echo "[-] LỖI: Không tìm thấy Clang tại toolchains/clang/!"
          exit 1
        fi

        # Đưa file RPMB về nguyên bản tuyệt đối để hệ thống tự xử lý sạch sẽ
        if [ -f "drivers/char/rpmb/rpmb-mtk.c" ]; then
          git checkout -- drivers/char/rpmb/rpmb-mtk.c
        fi

        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:/home/runner/python2_install/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        export HOSTCFLAGS="-fcommon"
        export LOCALVERSION=""
        mkdir -p out

        make O=out dandelion_defconfig LOCALVERSION=""
        make O=out olddefconfig LOCALVERSION=""

        # Lệnh make siêu tối giản, chỉ giữ lại cấu hình phần cứng gốc
        make -j$(nproc --all) O=out \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          MTK_PLATFORM=mt6765 \
          MTK_COMBO_CHIP=MT6632 \
          WLAN_CHIP_ID=MT6632 \
          HOSTCFLAGS="-fcommon" \
          LOCALVERSION="" \
          EXTRAVERSION=""

    # ===== 5. ĐÓNG GÓI SẢN PHẨM =====
    - name: Pack Kernel Artifacts
      if: success()
      run: |
        cd out/arch/arm64/boot/
        if [ -f Image.gz ]; then
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz
        else
          echo "Error: Image.gz not found!"
          exit 1
        fi

    # ===== 6. UPLOAD SẢN PHẨM =====
    - name: Upload Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi9A-KSU-Zip
        path: out/arch/arm64/boot/Kernel-Redmi9A-KSU.zip
 