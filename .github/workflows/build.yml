name: Build Kernel

on:
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub

jobs:
  build:
    runs-on: ubuntu-22.04 # Sử dụng Ubuntu 22.04

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt các gói phụ thuộc và Python 2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python2 \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libncurses5-dev \
            libelf-dev \
            crossbuild-essential-arm64 \
            gcc-arm-linux-gnueabi \
            git \
            wget \
            curl

          # Thiết lập Python 2 làm python mặc định nếu chưa có
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1 || true

      - name: Thiết lập môi trường và Biên dịch Kernel
        run: |
          # Thiết lập biến môi trường
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$(pwd)/Clang/bin:$PATH"
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Kiểm tra file config ở thư mục gốc
          if [ ! -f "config" ]; then
            echo "Lỗi: Không tìm thấy file 'config' ở thư mục gốc!"
            exit 1
          fi

          # Chép file 'config' thành '.config' để tiến hành biên dịch
          cp config .config

          echo "=== Cấu hình kernel ==="
          make ARCH=arm64 olddefconfig

          echo "=== Bắt đầu biên dịch Kernel ==="
          make -j$(nproc) ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Tải lên sản phẩm (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image
