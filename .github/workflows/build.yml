name: Biên Dịch Kernel Redmi 9A (Sử dụng Toolchains có sẵn)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    # ===== 1. CÀI ĐẶT CÁC GÓI NỀN APT (BẮT BUỘC CHO HỆ THỐNG RUNNER) =====
    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zlib1g-dev \
        libffi-dev libsqlite3-dev zip

    # ===== 2. LIÊN KẾT PYTHON2 CÓ SẴN TRONG MÃ NGUỒN VÀO HỆ THỐNG =====
    - name: Link Local Python2
      run: |
        if [ -f "$GITHUB_WORKSPACE/toolchains/python2/bin/python2.7" ]; then
          echo "[+] Tìm thấy Python2 trong thư mục mã nguồn."
          # Tạo liên kết ảo để hệ thống nhận diện lệnh `python` từ thư mục local của bạn
          sudo ln -sf $GITHUB_WORKSPACE/toolchains/python2/bin/python2.7 /usr/bin/python
          python --version
        else
          echo "[-] LỖI: Không tìm thấy Python2 tại toolchains/python2/. Vui lòng chạy workflow thiết lập trước!"
          exit 1
        fi

    # ===== 3. BIÊN DỊCH KERNEL VỚI CLANG CÓ SẴN TRONG MÃ NGUỒN =====
    - name: Compile Kernel
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/clang/bin/clang" ]; then
          echo "[-] LỖI: Không tìm thấy Clang tại toolchains/clang/. Vui lòng chạy workflow thiết lập trước!"
          exit 1
        fi

        # Đưa Clang từ thư mục toolchains/ local lên đầu biến môi trường PATH
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Cấu hình trình biên dịch chéo
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        export HOSTCFLAGS="-fcommon"
        export LOCALVERSION=""
        mkdir -p out

        # Khởi tạo cấu hình defconfig cho thiết bị (dandelion)
        make O=out dandelion_defconfig LOCALVERSION=""
        make O=out olddefconfig LOCALVERSION=""

        # Bắt đầu quá trình build kernel với đa nhân
        make -j$(nproc --all) O=out \
        CC=clang \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        HOSTCFLAGS="-fcommon" \
        KCFLAGS="-w" \
        LOCALVERSION="" \
        EXTRAVERSION=""

    # ===== 4. ĐÓNG GÓI SẢN PHẨM =====
    - name: Pack Kernel Artifacts
      if: success()
      run: |
        cd out/arch/arm64/boot/
        if [ -f Image.gz ]; then
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz
        else
          echo "Error: Image.gz not found!"
          exit 1
        fi

    # ===== 5. UPLOAD SẢN PHẨM LÊN GIAO DIỆN GITHUB =====
    - name: Upload Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi9A-KSU-Zip
        path: out/arch/arm64/boot/Kernel-Redmi9A-KSU.zip
