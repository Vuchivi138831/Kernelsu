name: Build Kernel

on:
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub

jobs:
  build:
    runs-on: ubuntu-22.04 # Sử dụng Ubuntu 22.04

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt các gói phụ thuộc và Python 2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python2 \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libncurses5-dev \
            libelf-dev \
            crossbuild-essential-arm64 \
            git \
            wget \
            curl

          # Thiết lập Python 2 làm python mặc định
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1 || true

      - name: Tải GCC 32-bit cho Android (arm-linux-androideabi)
        run: |
          echo "Đang tải GCC 32-bit Android Toolchain..."
          mkdir -p $HOME/gcc-arm
          curl -sL "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android10-release.tar.gz" | tar -xz -C $HOME/gcc-arm

      - name: Thiết lập môi trường và Biên dịch Kernel
        run: |
          # Thêm đường dẫn Clang và GCC 32-bit vào PATH
          export PATH="$(pwd)/Clang/bin:$HOME/gcc-arm/bin:$PATH"

          # Thiết lập các biến môi trường
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-

          # SỬA LỖI YYLLOC: Thêm cờ -fcommon cho Host Compiler
          export HOSTCFLAGS="-fcommon"
          export HOSTCXXFLAGS="-fcommon"

          # Kiểm tra file config ở thư mục gốc
          if [ ! -f "config" ]; then
            echo "Lỗi: Không tìm thấy file 'config' ở thư mục gốc!"
            exit 1
          fi

          # Chép file 'config' thành '.config'
          cp config .config

          echo "=== Cấu hình kernel ==="
          make ARCH=arm64 HOSTCFLAGS="-fcommon" olddefconfig

          echo "=== Bắt đầu biên dịch Kernel ==="
          make -j$(nproc) \
            ARCH=arm64 \
            CC=clang \
            HOSTCFLAGS="-fcommon" \
            HOSTCXXFLAGS="-fcommon" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Tải lên sản phẩm (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image
