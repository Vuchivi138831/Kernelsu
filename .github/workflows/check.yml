name: Kiểm tra Mã nguồn Kprobe Toàn diện

on:
  workflow_dispatch: # Chạy thủ công trên GitHub

jobs:
  audit-kprobes:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn Kernel
      uses: actions/checkout@v4

    - name: Grep Kết Quả Kprobe ARM64
      run: |
        echo "=== BẮT ĐẦU QUÉT TOÀN BỘ KẾT CẤU KPROBE PHẦN CỨNG ARM64 ==="
        
        # Lệnh grep tổng hợp tất cả các hàm và cấu trúc cốt lõi trong một phần duy nhất
        grep -rnE "kprobe_handler|kprobe_breakpoint_handler|kprobe_step_handler|arch_prepare_kprobe|arch_arm_kprobe|arch_disarm_kprobe|trampoline|decode_insn|simulate_insn" arch/arm64/kernel/probes/ || echo "Không tìm thấy kết quả nào trùng khớp!"
        
        echo "=== KẾT THÚC QUÉT ==="
