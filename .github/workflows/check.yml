name: Kiểm Tra Driver Camera

on:
  # Chạy mỗi khi bạn push code lên branch main/master
  push:
    branches: [ "main", "master" ]
  # Chạy khi bạn tạo Pull Request
  pull_request:
    branches: [ "main", "master" ]
  # Cho phép bạn bấm nút chạy thủ công trên giao diện GitHub
  workflow_dispatch:

jobs:
  check-sensor:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Clone mã nguồn kernel của bạn về máy ảo
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    # Bước 2: Chạy lệnh tìm kiếm driver
    - name: Quét tìm kiếm cảm biến Hynix Hi1337
      run: |
        echo "=== BẮT ĐẦU QUÉT MÃ NGUỒN ==="
        
        # Tạo một file tạm để lưu kết quả quét
        grep -rnw "hynix_hi1337" . > grep_result.txt || true
        
        # Kiểm tra xem có tìm thấy kết quả nào không
        if [ -s grep_result.txt ]; then
          echo "✅ Tìm thấy các dòng chứa cấu hình hynix_hi1337:"
          cat grep_result.txt
          
          # Kiểm tra riêng xem có biến thể _iiii của bạn không
          if grep -q "hynix_hi1337_iiii" grep_result.txt; then
            echo "🎉 TUYỆT VỜI: Đã tìm thấy driver biến thể _iiii cho máy của bạn!"
          else
            echo "❌ CẢNH BÁO: Không tìm thấy biến thể _iiii. Camera có thể không hoạt động!"
            # Bỏ dấu '#' ở dòng dưới nếu bạn muốn workflow THẤT BẠI LUÔN để dừng biên dịch:
            # exit 1
          fi
        else
          echo "❌ LỖI RỒI: Hoàn toàn không tìm thấy bất kỳ từ khóa 'hynix_hi1337' nào trong toàn bộ mã nguồn!"
          exit 1
        fi
