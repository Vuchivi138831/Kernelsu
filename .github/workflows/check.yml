name: Quét Cấu trúc Thư mục Manager

on:
  workflow_dispatch: # Chạy thủ công trên GitHub

jobs:
  list-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn Kernel
      uses: actions/checkout@v4

    - name: Liệt kê toàn bộ sơ đồ file và thư mục
      run: |
        TARGET_DIR="drivers/KernelSU-0.9.5/manager"
        
        echo "=== BẮT ĐẦU SƠ ĐỒ CẤU TRÚC: $TARGET_DIR ==="
        
        if [ -d "$TARGET_DIR" ]; then
          # Sử dụng find để lùng sục mọi ngóc ngách, hiển thị cả file ẩn và sắp xếp theo thứ tự chữ cái
          find "$TARGET_DIR" | sort | sed "s|$TARGET_DIR|/manager|"
        else
          echo "❌ Lỗi: Không tìm thấy thư mục $TARGET_DIR"
          exit 1
        fi
        
        echo "=== KẾT THÚC SƠ ĐỒ ==="
