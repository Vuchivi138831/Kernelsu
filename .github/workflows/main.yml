name: Build Kernel Dandelion

on:
  workflow_dispatch: # Kích hoạt chạy bằng tay từ tab Actions

jobs:
  build_kernel:
    runs-on: ubuntu-20.04 # Sử dụng Ubuntu 20.04 để đảm bảo tính tương thích với thư viện GCC/Clang đời cũ

    steps:
      - name: Tải mã nguồn Kernel từ Repo của bạn
        uses: actions/checkout@v4

      - name: Cài đặt các công cụ phụ trợ hệ thống
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils bzip2 gzip unzip curl git make u-boot-tools libmail-sendmail-perl

      - name: Tải AOSP Clang và GCC Toolchains (Phù hợp Kernel 4.9 / 4.19)
        run: |
          echo "Đang tải AOSP Clang r383902 (tương đương bản Clang 11 dùng phổ biến cho Android Q/R)..."
          mkdir -p $GITHUB_WORKSPACE/clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/android-11.0.0_r1/clang-r383902.tar.gz | tar -xzC $GITHUB_WORKSPACE/clang

          echo "Tải GCC 64-bit (AOSP GCC 4.9) để hỗ trợ liên kết bộ gom..."
          mkdir -p $GITHUB_WORKSPACE/gcc64
          curl -L https://android.googlesource.com/platform/prebuilts/gcc/host/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/android-11.0.0_r1.tar.gz | tar -xzC $GITHUB_WORKSPACE/gcc64

          echo "Tải GCC 32-bit (AOSP GCC 4.9) bắt buộc cho kiến trúc lai của MediaTek..."
          mkdir -p $GITHUB_WORKSPACE/gcc32
          curl -L https://android.googlesource.com/platform/prebuilts/gcc/host/linux-x86/arm/arm-linux-androideabi-4.9/+archive/android-11.0.0_r1.tar.gz | tar -xzC $GITHUB_WORKSPACE/gcc32

      - name: Tiến hành Biên dịch Kernel bằng Clang
        run: |
          # 1. Định nghĩa các đường dẫn Toolchain vào biến môi trường
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          
          # 2. Cấu hình các cờ biên dịch chuẩn cho Clang Cross-Compile
          export ARCH=arm64
          export SUBARCH=arm64
          export HEADER_ARCH=arm64
          
          # Đặt cấu hình Clang và các trình biên dịch GCC hỗ trợ kèm theo
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # 3. Tạo thư mục chứa file đầu ra (Out) để dọn dẹp cây mã nguồn
          mkdir -p out
          
          echo "--- Bắt đầu nạp cấu hình dandelion_defconfig ---"
          make O=out dandelion_defconfig
          
          echo "--- Bắt đầu quá trình Compile Kernel (Sử dụng tối đa luồng máy ảo) ---"
          # Chạy lệnh make biên dịch song song để rút ngắn thời gian
          make -j$(nproc) O=out \
                      CC=$CC \
                      CLANG_TRIPLE=$CLANG_TRIPLE \
                      CROSS_COMPILE=$CROSS_COMPILE \
                      CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32

      - name: Kiểm tra sản phẩm đầu ra
        run: |
          echo "--- Kiểm tra file thành phẩm Kernel ---"
          # Đối với kiến trúc arm64, file nhân đích sau khi build thành công sẽ nằm ở đường dẫn này
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "Biên dịch THÀNH CÔNG! Đã tìm thấy Image.gz-dtb"
            mkdir -p thành_phẩm
            cp out/arch/arm64/boot/Image.gz-dtb thành_phẩm/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Biên dịch THÀNH CÔNG! Đã tìm thấy Image.gz"
            mkdir -p thành_phẩm
            cp out/arch/arm64/boot/Image.gz thành_phẩm/
          else
            echo "LỖI: Không tìm thấy file nhân thành phẩm. Kiểm tra log lỗi biên dịch phía trên!"
            exit 1
          fi

      - name: Lưu file Kernel thành phẩm về máy của bạn
        uses: actions/checkout@v4
        with:
          name: Kernel-Dandelion-KSU
          path: thành_phẩm/
          
