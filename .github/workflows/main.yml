name: Build Kernel Dandelion

on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Tải mã nguồn Kernel từ Repo
        uses: actions/checkout@v4

      - name: Cài đặt các công cụ phụ trợ hệ thống & Python 2
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils bzip2 gzip unzip curl git make u-boot-tools libmail-sendmail-perl liblz4-tool lzop python2-minimal
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Thiết lập Bộ nhớ đệm (Cache) cho Toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/clang
            ${{ github.workspace }}/gcc64
            ${{ github.workspace }}/gcc32
          key: ${{ runner.os }}-toolchains-v3

      - name: Tải AOSP Clang và GCC Toolchains (Chỉ tải nếu chưa có trong Cache)
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "Không tìm thấy Cache. Bắt đầu tải Toolchains mới..."
          
          echo "--- Tải Clang r383902 từ nguồn Prebuilt ổn định ---"
          # Sử dụng bản Clang r383902 chuẩn được đóng gói sẵn cho GitHub Actions
          git clone --depth=1 https://gitlab.com/NghiaPTX/android_prebuilts_clang_host_linux-x86_clang-r383902 $GITHUB_WORKSPACE/clang

          echo "--- Tải GCC 64-bit (GCC 4.9) ---"
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 $GITHUB_WORKSPACE/gcc64

          echo "--- Tải GCC 32-bit (GCC 4.9) ---"
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 $GITHUB_WORKSPACE/gcc32
          
          echo "Tải toàn bộ Toolchains hoàn tất!"

      - name: Tiến hành Biên dịch Kernel bằng Clang
        run: |
          export PATH="$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          
          export ARCH=arm64
          export SUBARCH=arm64
          export HEADER_ARCH=arm64
          
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          mkdir -p out
          
          echo "--- Bắt đầu nạp cấu hình dandelion_defconfig ---"
          make O=out dandelion_defconfig
          
          echo "--- Bắt đầu quá trình Compile Kernel ---"
          make -j$(nproc) O=out \
                      CC=$CC \
                      CLANG_TRIPLE=$CLANG_TRIPLE \
                      CROSS_COMPILE=$CROSS_COMPILE \
                      CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32

      - name: Kiểm tra sản phẩm đầu ra
        run: |
          echo "--- Kiểm tra file thành phẩm Kernel ---"
          mkdir -p thanh_pham
          
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "Biên dịch THÀNH CÔNG! Đã tìm thấy Image.gz-dtb"
            cp out/arch/arm64/boot/Image.gz-dtb thanh_pham/
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Biên dịch THÀNH CÔNG! Đã tìm thấy Image.gz"
            cp out/arch/arm64/boot/Image.gz thanh_pham/
          else
            echo "LỖI: Không tìm thấy file nhân thành phẩm."
            exit 1
          fi

      - name: Lưu file Kernel thành phẩm về máy của bạn
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Dandelion-KSU
          path: thanh_pham/
