name: Build Redmi 9A KernelSU (Stable)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    # ===== 1. CẤU HÌNH CACHE CHO CÁC GÓI APT (HỆ THỐNG) =====
    - name: Cache APT Packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-cache-${{ runner.os }}-v1

    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zlib1g-dev \
        libffi-dev libsqlite3-dev zip

    # ===== 2. TẢI VÀ THIẾT LẬP GOOGLE AOSP CLANG 12 =====
    - name: Download and Setup AOSP Clang 12
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        echo "[+] Đang tải chính xác Google AOSP Clang r416183b (v12.0.5)..."
        # Link tải trực tiếp gói Clang r416183b từ nhánh android12-release của Google
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz
        tar -xf clang-r416183b.tar.gz
        rm -f clang-r416183b.tar.gz
        echo "[+] Giải nén thành công Clang 12 tại $GITHUB_WORKSPACE/clang"

    # ===== 3. CẤU HÌNH CACHE CHO PYTHON2 (MÃ NGUỒN & THƯ MỤC CÀI ĐẶT) =====
    - name: Cache Python2 Core
      uses: actions/cache@v4
      with:
        path: |
          /opt/python2
          ${{ github.workspace }}/Python-2.7.18.tgz
        key: python2-full-cache-v1

    # ===== 4. THIẾT LẬP PYTHON2 =====
    - name: Setup Python2
      run: |
        if [ ! -f /opt/python2/bin/python2.7 ]; then
          echo "[+] Cache không tồn tại, bắt đầu tải và biên dịch Python2..."
          if [ ! -f Python-2.7.18.tgz ]; then
            wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          fi
          tar -xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=/opt/python2
          make -j$(nproc)
          sudo make install
          cd ..
        else
          echo "[+] Đã tìm thấy Cache! Bỏ qua bước cài đặt Python2."
        fi

        # Tạo liên kết ảo để hệ thống nhận diện lệnh `python`
        sudo ln -sf /opt/python2/bin/python2.7 /usr/bin/python
        python --version

    # ===== 5. BIÊN DỊCH KERNEL KHỚP TRÌNH BIÊN DỊCH GỐC =====
    - name: Compile Kernel
      run: |
        # Đưa Clang 12 và các công cụ hỗ trợ lên đầu biến PATH
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Cấu hình biên dịch chéo bằng Clang 12
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        export HOSTCFLAGS="-fcommon"
        export LOCALVERSION=""
        mkdir -p out

        # Nạp cấu hình defconfig gốc
        make O=out dandelion_defconfig LOCALVERSION=""
        make O=out olddefconfig LOCALVERSION=""

        # Bắt đầu quá trình build với cờ LLVM_IAS=1 để vá triệt để lỗi /usr/bin/as
        make -j$(nproc --all) O=out \
        CC=clang \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
        HOSTCC=clang \
        HOSTCXX=clang++ \
        LLVM_IAS=1 \
        HOSTCFLAGS="-fcommon" \
        KCFLAGS="-w" \
        LOCALVERSION="" \
        EXTRAVERSION=""

    # ===== 6. ĐÓNG GÓI SẢN PHẨM =====
    - name: Pack Kernel Artifacts
      if: success()
      run: |
        cd out/arch/arm64/boot/
        if [ -f Image.gz-dtb ]; then
          echo "[+] Tìm thấy Image.gz-dtb, tiến hành đóng gói..."
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz-dtb
        elif [ -f Image.gz ]; then
          echo "[+] Tìm thấy Image.gz, tiến hành đóng gói..."
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz
        else
          echo "Error: Không tìm thấy file nhân thành phẩm!"
          exit 1
        fi

    # ===== 7. UPLOAD SẢN PHẨM LÊN GIAO DIỆN GITHUB =====
    - name: Upload Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi9A-KSU-Zip
        path: out/arch/arm64/boot/Kernel-Redmi9A-KSU.zip
