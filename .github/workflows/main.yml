name: Build Redmi 9A KSU

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ========================================================
  # JOB 1: BIÊN DỊCH VÀ LƯU TRỮ PYTHON2 VÀO CACHE TRƯỚC
  # ========================================================
  setup_python2:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt công cụ cần thiết để dựng Python
      run: |
        sudo apt update
        sudo apt install -y make build-essential wget zlib1g-dev libffi-dev libsqlite3-dev libreadline-dev libbz2-dev

    - name: Kiểm tra Cache Python2
      id: python2-cache
      uses: actions/cache@v4
      with:
        path: /home/runner/python2_install
        key: python2-complete-cache-v3

    - name: Biên dịch và Lưu Cache trực tiếp (Nếu chưa có)
      if: steps.python2-cache.outputs.cache-hit != 'true'
      run: |
        echo "[+] Không tìm thấy Cache, tiến hành build mới Python2..."
        mkdir -p /home/runner/python2_install
        wget -q https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
        tar -xf Python-2.7.18.tgz
        cd Python-2.7.18
        ./configure --prefix=/home/runner/python2_install
        make -j$(nproc)
        make install
        cd ..
        rm -rf Python-2.7.18 Python-2.7.18.tgz
        echo "[+] Đã build xong Python2 thành công và chuẩn bị đóng Cache!"

  # ========================================================
  # JOB 2: XÂY DỰNG HẠT NHÂN KERNEL (CHẠY SAU KHI CÓ CACHE)
  # ========================================================
  build_kernel:
    runs-on: ubuntu-latest
    needs: setup_python2 # Ép buộc phải xong Job 1 mới cho chạy Job này
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zip unzip

    - name: Lấy Cache Python2 đã lưu từ Job trước
      id: load-python2-cache
      uses: actions/cache@v4
      with:
        path: /home/runner/python2_install
        key: python2-complete-cache-v3

    - name: Cấu hình liên kết Python2 vào hệ thống
      run: |
        if [ ! -d "/home/runner/python2_install/bin" ]; then
          echo "[-] LỖI NGHIÊM TRỌNG: Không lấy được Cache Python2 từ bước trước!"
          exit 1
        fi
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python
        sudo ln -sf /home/runner/python2_install/bin/python2.7 /usr/bin/python2
        python --version

    - name: Compile Kernel Siêu Tối Giản
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/clang/bin/clang" ]; then
          echo "[-] LỖI: Không tìm thấy Clang tại toolchains/clang/!"
          exit 1
        fi

        if [ -f "drivers/char/rpmb/rpmb-mtk.c" ]; then
          git checkout -- drivers/char/rpmb/rpmb-mtk.c
        fi

        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:/home/runner/python2_install/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        export CC=clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        export HOSTCFLAGS="-fcommon"
        mkdir -p out

        # 1. Tạo file cấu hình từ defconfig mặc định
        make O=out defconfig

        # 2. ÉP BUỘC ghi đè chuỗi LOCALVERSION bất kể cấu hình cũ và tắt AUTO_LOCALVERSION
        chmod +x scripts/config
        ./scripts/config --file out/.config --set-str LOCALVERSION "-perf-gd6489126e4e3"
        ./scripts/config --file out/.config --disable LOCALVERSION_AUTO

        # 3. Đồng bộ lại cấu hình vừa chỉnh sửa
        make O=out olddefconfig

        # 4. Tiến hành biên dịch
        make -j$(nproc --all) O=out \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          HOSTCFLAGS="-fcommon" \
          LOCALVERSION="" \
          EXTRAVERSION=""

    - name: Pack Kernel Artifacts
      if: success()
      run: |
        cd out/arch/arm64/boot/
        if [ -f Image.gz ]; then
          zip -r9 Kernel-Redmi9A-KSU.zip Image.gz
        else
          echo "Error: Image.gz not found!"
          exit 1
        fi

    - name: Upload Kernel Zip
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi9A-KSU-Zip
        path: out/arch/arm64/boot/Kernel-Redmi9A-KSU.zip
