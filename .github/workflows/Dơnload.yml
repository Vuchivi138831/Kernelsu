name: Tải và Lưu Trữ Bộ Công Cụ Biên Dịch (Clang & Python2)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  setup-tools:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ===== 1. CÀI ĐẶT ĐẦY ĐỦ THƯ VIỆN NỀN (ĐỂ PYTHON2 KHÔNG BỊ THIẾU MODULE) =====
    - name: Install Build Essentials
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex libssl-dev make \
        libc6-dev libncurses5-dev gcc-aarch64-linux-gnu \
        gcc-arm-linux-gnueabi curl build-essential wget zlib1g-dev \
        libffi-dev libsqlite3-dev zip libreadline-dev libbz2-dev

    # ===== 2. TẢI GOOGLE AOSP CLANG GỐC (V9.0.3) =====
    - name: Setup AOSP Clang 9.0.3
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/clang/bin/clang" ]; then
          echo "[+] Chưa có Clang trong mã nguồn. Tiến hành tải mới..."
          mkdir -p $GITHUB_WORKSPACE/toolchains/clang
          cd $GITHUB_WORKSPACE/toolchains/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353983c.tar.gz
          tar -xf clang-r353983c.tar.gz
          rm -f clang-r353983c.tar.gz
          echo "NEED_COMMIT=true" >> $GITHUB_ENV
        else
          echo "[+] Đã tìm thấy Clang có sẵn trong mã nguồn! Bỏ qua."
        fi

    # ===== 3. TẢI VÀ BIÊN DỊCH PYTHON2 HOÀN CHỈNH =====
    - name: Setup Python2
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/toolchains/python2/bin/python2.7" ] || [ ! -f "$GITHUB_WORKSPACE/toolchains/python2/lib/python2.7/lib-dynload/select.so" ]; then
          echo "[+] Bắt đầu tải và biên dịch Python2 hoàn chỉnh..."
          rm -rf $GITHUB_WORKSPACE/toolchains/python2
          mkdir -p $GITHUB_WORKSPACE/toolchains/python2
          
          cd $GITHUB_WORKSPACE
          wget -q https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=$GITHUB_WORKSPACE/toolchains/python2
          make -j$(nproc)
          make install
          
          cd $GITHUB_WORKSPACE
          rm -rf Python-2.7.18 Python-2.7.18.tgz
          echo "NEED_COMMIT=true" >> $GITHUB_ENV
        else
          echo "[+] Đã tìm thấy Python2 hoàn chỉnh có sẵn trong mã nguồn! Bỏ qua."
        fi

    # ===== 4. ĐẨY THƯ MỤC TOOLCHAINS VỀ LẠI MÃ NGUỒN =====
    - name: Push Toolchains to Repository
      if: env.NEED_COMMIT == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add toolchains/
        git commit -m "chore: cập nhật bộ công cụ Clang và Python2 hoàn chỉnh [skip ci]"
        git push origin HEAD:${{ github.ref }}
        echo "[+] Đã lưu thành công Clang và Python2 vào thư mục toolchains/!"
