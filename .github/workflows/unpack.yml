name: Giải nén KernelSU thủ công và Push về Repo

# Cho phép kích hoạt quy trình bằng tay (thủ công) từ giao diện GitHub
on:
  workflow_dispatch:

# Cấp quyền đọc và ghi để workflow có thể commit/push mã nguồn mới về repo
permissions:
  contents: write

jobs:
  unpack_and_push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kiểm tra và lấy mã nguồn hiện tại của kho lưu trữ
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Kiểm tra xem tệp kernelsu.zip có tồn tại trong thư mục drivers/ không
      - name: Kiểm tra sự tồn tại của tệp ZIP trong thư mục drivers/
        run: |
          if [ ! -f "drivers/kernelsu.zip" ]; then
            echo "❌ LỖI: Không tìm thấy tệp 'kernelsu.zip' tại đường dẫn 'drivers/kernelsu.zip'!"
            exit 1
          fi

      # Bước 3: Tiến hành giải nén trực tiếp vào thư mục drivers/
      - name: Tiến hành giải nén kernelsu.zip vào drivers/
        run: |
          echo "🔄 Đang tiến hành giải nén tệp drivers/kernelsu.zip..."
          unzip drivers/kernelsu.zip -d drivers/
          echo "✅ Giải nén thành công!"

      # Bước 4: Cấu hình Git, commit các file vừa giải nén và đẩy ngược về kho lưu trữ
      - name: Đẩy mã nguồn đã giải nén về kho lưu trữ (Push back to Repo)
        run: |
          echo "🔧 Cấu hình danh tính Git..."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "➕ Thêm các tệp tin mới vào hàng đợi commit..."
          # Đưa tất cả các file vừa được giải nén trong drivers/ vào Git track
          git add drivers/
          
          # Kiểm tra xem có gì thay đổi không trước khi commit để tránh bị lỗi "nothing to commit"
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ Không có tệp tin mới nào thay đổi hoặc cần commit."
          else
            echo "💾 Tiến hành commit và push..."
            git commit -m "Chạy quy trình: Giải nén drivers/kernelsu.zip tự động"
            git push
            echo "🚀 Đã đẩy toàn bộ mã nguồn giải nén thành công về repository của bạn!"
          fi
