name: Unzip and Overwrite All Code

on:
  push:
  workflow_dispatch:

jobs:
  unzip-and-update:
    runs-on: ubuntu-latest
    
    # Cấp quyền đọc và ghi (Read and Write) cho GitHub Action workflow
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and Overwrite
        run: |
          # Tham số -o (overwrite) sẽ tự động ghi đè tất cả các file cũ có trong file zip 
          # mà không cần xóa trước và không cần hỏi xác nhận.
          unzip -o fs.zip -d .

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 'git add .' sẽ thêm TẤT CẢ các file vừa được giải nén/ghi đè vào hàng chờ commit
          git add .
          
          # Kiểm tra xem có bất kỳ sự thay đổi nào so với commit cũ không
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated update: overwrite files from fs.zip"
            git push
          else
            echo "No changes detected."
          fi
