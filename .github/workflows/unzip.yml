name: Update Connectivity Driver

on:
  workflow_dispatch:

jobs:
  update-source:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Replace connectivity folder
      run: |
        # Di chuyển vào thư mục chứa file zip
        cd drivers/misc/mediatek/
        
        # Xóa thư mục connectivity cũ đi trước
        rm -rf connectivity
        
        # Giải nén file zip ngay tại chỗ (tự động sinh ra thư mục connectivity mới)
        unzip -o connectivity.zip
        
        # Xóa file zip đi để tránh làm nặng repo của bạn
        rm -f connectivity.zip

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Thêm thư mục mới vào git để chuẩn bị push
        git add drivers/misc/mediatek/connectivity
        
        if git diff-index --quiet HEAD --; then
          echo "Không có thay đổi nào so với mã nguồn hiện tại."
        else
          git commit -m "Automated update: Refreshed connectivity driver from zip"
          git push origin ${{ github.ref_name }}
        fi
